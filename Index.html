<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>ObrasNav</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0e1018;--s1:#181b27;--s2:#1f2235;--acc:#f5a623;--grn:#3ecf72;--red:#e05c6e;--txt:#edf0f9;--mut:#6e748f;--brd:#2a2f47}
html,body{height:100%;font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--txt);overflow:hidden}
#app{display:flex;flex-direction:column;height:100svh}

#hd{flex-shrink:0;background:var(--s1);border-bottom:1px solid var(--brd);padding:11px 14px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:17px;font-weight:800}.logo em{color:var(--acc);font-style:normal}

#tabs{flex-shrink:0;display:flex;background:var(--s1);border-bottom:1px solid var(--brd)}
.tb{flex:1;padding:10px 2px;border:none;background:none;color:var(--mut);font-size:12px;font-weight:700;cursor:pointer;border-bottom:2px solid transparent}
.tb.on{color:var(--acc);border-bottom-color:var(--acc)}

#ct{flex:1;overflow:hidden;position:relative;min-height:0}
.pn{position:absolute;inset:0;display:none;flex-direction:column}
.pn.on{display:flex}

/* mapa */
#mapaContainer{flex:1;position:relative;min-height:0;background:var(--s2)}
#mapaPlaceholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:20px;text-align:center}
#mapaPlaceholder .ic{font-size:38px}
#mapaPlaceholder p{font-size:13px;color:var(--mut);line-height:1.6}
#mapBar{flex-shrink:0;background:var(--s1);border-top:1px solid var(--brd);padding:8px 10px;display:flex;gap:7px;align-items:center}
#mapInfo{flex:1;font-size:11px;color:var(--mut)}

/* obras */
.ph{flex-shrink:0;padding:12px 14px 8px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.ph h2{font-size:15px;font-weight:800}
.ph-right{display:flex;align-items:center;gap:6px}
.badge{background:var(--acc);color:#000;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}
.sc{flex:1;overflow-y:auto;padding:0 10px 16px}

/* barra de seleção múltipla */
#selBar{flex-shrink:0;background:#1a0a0a;border-bottom:1px solid rgba(224,92,110,.3);padding:9px 14px;display:none;align-items:center;justify-content:space-between;gap:8px}
#selBar.on{display:flex}
#selInfo{font-size:12px;font-weight:700;color:var(--red)}

.card{background:var(--s1);border:1px solid var(--brd);border-radius:10px;padding:12px;margin-bottom:9px;position:relative;transition:border-color .15s}
.card.sel-rota{border-color:var(--acc)}
.card.sel-del{border-color:var(--red);background:#1a0e0e}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px}
.card-nome{font-size:14px;font-weight:800}
.chip{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;flex-shrink:0}
.card-info{font-size:11px;color:var(--mut);line-height:1.7;margin-bottom:8px}
.card-btns{display:flex;gap:5px;flex-wrap:wrap}
.sel-check{position:absolute;top:10px;right:10px;width:22px;height:22px;border-radius:50%;border:2px solid var(--brd);background:var(--s2);display:none;align-items:center;justify-content:center;font-size:13px;cursor:pointer}
.sel-mode .sel-check{display:flex}
.sel-mode .card-btns{display:none}
.card.sel-del .sel-check{background:var(--red);border-color:var(--red);color:#fff}

/* rota */
.ri{background:var(--s1);border:1px solid var(--brd);border-radius:10px;padding:11px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.rnum{width:27px;height:27px;border-radius:50%;background:var(--acc);color:#000;font-size:12px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rinfo{flex:1;min-width:0}.rinfo b{font-size:13px;display:block}.rinfo small{font-size:11px;color:var(--mut)}
.rdel{background:none;border:none;color:var(--red);font-size:20px;cursor:pointer;padding:0 4px}
.rfoot{flex-shrink:0;padding:10px;border-top:1px solid var(--brd);display:flex;gap:7px}

/* modal */
#mb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:999;align-items:flex-end}
#mb.on{display:flex}
.mo{background:var(--s1);border-radius:18px 18px 0 0;padding:20px 16px 34px;width:100%;max-height:88svh;overflow-y:auto;animation:up .2s ease}
@keyframes up{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.mo h3{font-size:17px;font-weight:800;margin-bottom:14px}
.fg{margin-bottom:11px}
.fg label{font-size:10px;color:var(--mut);font-weight:700;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:4px}
.fg input,.fg select,.fg textarea{width:100%;background:var(--s2);border:1px solid var(--brd);border-radius:8px;padding:10px 11px;color:var(--txt);font-size:14px;outline:none;font-family:inherit;-webkit-appearance:none;appearance:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--acc)}
.fg textarea{resize:none;height:64px}
.fg select option{background:var(--s2)}
.hint{font-size:10px;color:var(--mut);margin-top:3px}
.mrow{display:flex;gap:8px;margin-top:8px}

/* botões */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:9px 13px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:inherit;text-decoration:none;white-space:nowrap;color:inherit;line-height:1}
.btn:active{opacity:.65}
.ba{background:var(--acc);color:#000}
.bg{background:var(--grn);color:#000;flex:1}
.bm{background:#4285f4;color:#fff}
.bm2{background:#4285f4;color:#fff;flex:1}
.bw{background:#25d366;color:#fff}
.bs{background:var(--s2);color:var(--txt);border:1px solid var(--brd)}
.bx{background:none;color:var(--mut);border:1px solid var(--brd)}
.bd{background:rgba(224,92,110,.12);color:var(--red);border:1px solid rgba(224,92,110,.25)}
.bdel{background:var(--red);color:#fff}
.sm{padding:6px 10px;font-size:11px;border-radius:6px}
.fl{flex:1}

.empty{text-align:center;padding:40px 16px;color:var(--mut);font-size:13px;line-height:1.8}
.empty .ic{font-size:36px;margin-bottom:8px}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px}
</style>
</head>
<body>
<div id="app">

  <div id="hd">
    <div class="logo">Obras<em>Nav</em></div>
    <button class="btn ba sm" onclick="novaObra()">＋ Nova Obra</button>
  </div>

  <div id="tabs">
    <button class="tb on" id="tb0" onclick="aba(0)">🗺 Mapa</button>
    <button class="tb"    id="tb1" onclick="aba(1)">🏗 Obras</button>
    <button class="tb"    id="tb2" onclick="aba(2)">🧭 Rota</button>
  </div>

  <div id="ct">

    <!-- ABA 0: MAPA -->
    <div class="pn on" id="pn0">
      <div id="mapaContainer">
        <div id="mapaPlaceholder">
          <div class="ic">🗺</div>
          <p>Carregando mapa...<br>Cadastre obras com endereço para ver os pins.</p>
        </div>
      </div>
      <div id="mapBar">
        <span id="mapInfo">Cadastre obras com endereço para ver no mapa</span>
        <button class="btn bs sm" onclick="atualizarMapa()">🔄 Atualizar</button>
      </div>
    </div>

    <!-- ABA 1: OBRAS -->
    <div class="pn" id="pn1">
      <!-- barra de seleção múltipla -->
      <div id="selBar">
        <span id="selInfo">0 selecionadas</span>
        <div style="display:flex;gap:6px">
          <button class="btn bx sm" onclick="cancelarSelecao()">Cancelar</button>
          <button class="btn bdel sm" onclick="excluirSelecionadas()">🗑 Excluir</button>
        </div>
      </div>
      <div class="ph">
        <h2>Obras</h2>
        <div class="ph-right">
          <span class="badge" id="cnt">0</span>
          <button class="btn bd sm" id="btnSelMode" onclick="toggleSelMode()">☑ Selecionar</button>
        </div>
      </div>
      <div class="sc" id="listaObras"></div>
    </div>

    <!-- ABA 2: ROTA -->
    <div class="pn" id="pn2">
      <div class="ph"><h2>Rota do dia</h2></div>
      <div class="sc" id="listaRota"></div>
      <div class="rfoot">
        <button class="btn bx sm" onclick="limparRota()">Limpar</button>
        <button class="btn bg" onclick="irWaze()">🚗 Waze</button>
        <button class="btn bm2" onclick="irMaps()">📱 Google Maps</button>
      </div>
    </div>

  </div>
</div>

<!-- MODAL -->
<div id="mb">
  <div class="mo">
    <h3 id="mTit">Nova Obra</h3>
    <div class="fg">
      <label>Nome / Cliente *</label>
      <input id="fNome" placeholder="Ex: Residência João Silva">
    </div>
    <div class="fg">
      <label>Endereço completo *</label>
      <input id="fEnd" placeholder="Rua, número, bairro, cidade">
      <div class="hint">⚠️ Preencha com precisão — é usado para navegação.</div>
    </div>
    <div class="fg">
      <label>Telefone</label>
      <input id="fTel" type="tel" placeholder="(00) 00000-0000">
    </div>
    <div class="fg">
      <label>Tipo de serviço</label>
      <input id="fTipo" placeholder="Ex: Janelas, portas, fachada...">
    </div>
    <div class="fg">
      <label>Status</label>
      <select id="fSt">
        <option value="p">Pendente</option>
        <option value="a">Em andamento</option>
        <option value="c">Concluída</option>
      </select>
    </div>
    <div class="fg">
      <label>Anotações</label>
      <textarea id="fNota" placeholder="Observações..."></textarea>
    </div>
    <div class="mrow">
      <button class="btn bx fl" onclick="fecharModal()">Cancelar</button>
      <button class="btn ba fl" onclick="salvar()">Salvar</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════
// DADOS
// ══════════════════════════════════════
var obras = [], rota = [], editId = null;
var selMode = false, selecionadas = [];

function carregar() {
  try { obras = JSON.parse(localStorage.getItem('on3_obras') || '[]'); } catch(e){ obras=[]; }
  try { rota  = JSON.parse(localStorage.getItem('on3_rota')  || '[]'); } catch(e){ rota=[];  }
}
function salvarLS() {
  localStorage.setItem('on3_obras', JSON.stringify(obras));
  localStorage.setItem('on3_rota',  JSON.stringify(rota));
}
carregar();

// ══════════════════════════════════════
// MAPA
// ══════════════════════════════════════
function atualizarMapa() {
  var old = document.getElementById('mapaIframe');
  if (old) old.remove();

  var comEnd = obras.filter(function(o){ return o.end && o.end.trim(); });

  if (!comEnd.length) {
    document.getElementById('mapaPlaceholder').style.display = 'flex';
    document.getElementById('mapInfo').textContent = 'Cadastre obras com endereço para ver no mapa';
    return;
  }

  document.getElementById('mapaPlaceholder').style.display = 'none';

  var iframe = document.createElement('iframe');
  iframe.id = 'mapaIframe';
  iframe.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;border:none';
  iframe.loading = 'lazy';
  iframe.referrerPolicy = 'no-referrer-when-downgrade';
  iframe.allowFullscreen = true;

  // Exibe todos os endereços como busca — o Maps mostra pins de todos
  var query = comEnd.map(function(o){ return o.end; }).join(' | ');
  iframe.src = 'https://maps.google.com/maps?q=' + encodeURIComponent(comEnd[0].end) + '&output=embed&z=14';

  document.getElementById('mapaContainer').appendChild(iframe);
  document.getElementById('mapInfo').textContent = comEnd.length + ' obra(s) no mapa';
}

// ══════════════════════════════════════
// ABAS
// ══════════════════════════════════════
function aba(n) {
  for (var i = 0; i < 3; i++) {
    document.getElementById('tb'+i).classList.toggle('on', i===n);
    document.getElementById('pn'+i).classList.toggle('on', i===n);
  }
  if (n === 0) atualizarMapa();
}

// ══════════════════════════════════════
// MODAL
// ══════════════════════════════════════
function novaObra() { abrirModal(null); }

function abrirModal(id) {
  editId = id;
  document.getElementById('mTit').textContent = id ? 'Editar Obra' : 'Nova Obra';
  var o = id ? obras.find(function(x){ return x.id===id; }) : null;
  document.getElementById('fNome').value  = o ? (o.nome  || '') : '';
  document.getElementById('fEnd').value   = o ? (o.end   || '') : '';
  document.getElementById('fTel').value   = o ? (o.tel   || '') : '';
  document.getElementById('fTipo').value  = o ? (o.tipo  || '') : '';
  document.getElementById('fSt').value    = o ? (o.status|| 'p'): 'p';
  document.getElementById('fNota').value  = o ? (o.nota  || '') : '';
  document.getElementById('mb').classList.add('on');
}

function fecharModal() {
  document.getElementById('mb').classList.remove('on');
  editId = null;
}

function salvar() {
  var nome = document.getElementById('fNome').value.trim();
  if (!nome) { alert('Informe o nome ou cliente.'); return; }
  var d = {
    nome:   nome,
    end:    document.getElementById('fEnd').value.trim(),
    tel:    document.getElementById('fTel').value.trim(),
    tipo:   document.getElementById('fTipo').value.trim(),
    status: document.getElementById('fSt').value,
    nota:   document.getElementById('fNota').value.trim()
  };
  if (editId) {
    var idx = obras.findIndex(function(x){ return x.id===editId; });
    if (idx >= 0) obras[idx] = Object.assign(obras[idx], d);
  } else {
    d.id = 'o' + Date.now();
    obras.push(d);
  }
  salvarLS(); renderTudo(); fecharModal();
}

// ══════════════════════════════════════
// EXCLUIR — simples e múltipla
// ══════════════════════════════════════
function excluir(id) {
  if (!confirm('Remover esta obra?')) return;
  obras = obras.filter(function(o){ return o.id !== id; });
  rota  = rota.filter(function(r){ return r !== id; });
  salvarLS();
  renderTudo();
}

// Modo seleção múltipla
function toggleSelMode() {
  selMode = !selMode;
  selecionadas = [];
  var lista = document.getElementById('listaObras');
  lista.classList.toggle('sel-mode', selMode);
  document.getElementById('selBar').classList.toggle('on', selMode);
  document.getElementById('btnSelMode').textContent = selMode ? '✕ Cancelar' : '☑ Selecionar';
  atualizarSelBar();
  renderObras();
}

function cancelarSelecao() {
  selMode = false;
  selecionadas = [];
  document.getElementById('listaObras').classList.remove('sel-mode');
  document.getElementById('selBar').classList.remove('on');
  document.getElementById('btnSelMode').textContent = '☑ Selecionar';
  renderObras();
}

function toggleSel(id) {
  var i = selecionadas.indexOf(id);
  if (i >= 0) selecionadas.splice(i, 1);
  else selecionadas.push(id);
  atualizarSelBar();
  renderObras();
}

function atualizarSelBar() {
  document.getElementById('selInfo').textContent = selecionadas.length + ' selecionada(s)';
}

function excluirSelecionadas() {
  if (!selecionadas.length) { alert('Selecione ao menos uma obra.'); return; }
  if (!confirm('Excluir ' + selecionadas.length + ' obra(s)?')) return;
  obras = obras.filter(function(o){ return selecionadas.indexOf(o.id) < 0; });
  rota  = rota.filter(function(r){ return selecionadas.indexOf(r) < 0; });
  salvarLS();
  cancelarSelecao();
  renderTudo();
}

// ══════════════════════════════════════
// LISTA OBRAS
// ══════════════════════════════════════
var SL = {p:'Pendente', a:'Em andamento', c:'Concluída'};
var SC = {
  p:'background:rgba(245,166,35,.18);color:#f5a623',
  a:'background:rgba(62,207,114,.18);color:#3ecf72',
  c:'background:rgba(110,116,143,.18);color:#6e748f'
};

function renderObras() {
  document.getElementById('cnt').textContent = obras.length;
  var el = document.getElementById('listaObras');
  if (selMode) el.classList.add('sel-mode');

  if (!obras.length) {
    el.innerHTML = '<div class="empty"><div class="ic">🏗</div>Nenhuma obra.<br>Toque em <b>+ Nova Obra</b>.</div>';
    return;
  }

  el.innerHTML = obras.map(function(o) {
    var naRota = rota.indexOf(o.id) >= 0;
    var selecionada = selecionadas.indexOf(o.id) >= 0;

    var navBtn = o.end
      ? '<a href="https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(o.end) + '&travelmode=driving" target="_blank" class="btn bm sm">🧭 Navegar</a>'
      : '';
    var waBtn = o.tel
      ? '<a href="https://wa.me/55' + o.tel.replace(/\D/g,'') + '" target="_blank" class="btn bw sm">💬</a>'
      : '';

    var cls = 'card';
    if (naRota) cls += ' sel-rota';
    if (selecionada) cls += ' sel-del';

    return '<div class="' + cls + '" onclick="' + (selMode ? 'toggleSel(\'' + o.id + '\')' : '') + '">'
      // check de seleção (visível só no modo seleção)
      + '<div class="sel-check">' + (selecionada ? '✓' : '') + '</div>'
      + '<div class="card-top">'
      + '<div class="card-nome">' + esc(o.nome) + '</div>'
      + '<span class="chip" style="' + SC[o.status] + '">' + SL[o.status] + '</span>'
      + '</div>'
      + '<div class="card-info">'
      + (o.end  ? '📍 ' + esc(o.end)  + '<br>' : '<span style="color:var(--red)">⚠️ Sem endereço</span><br>')
      + (o.tipo ? '🔧 ' + esc(o.tipo) + '<br>' : '')
      + (o.tel  ? '📞 ' + esc(o.tel)            : '')
      + '</div>'
      + '<div class="card-btns">'
      + '<button class="btn bs sm" onclick="event.stopPropagation();toggleRota(\'' + o.id + '\')">' + (naRota ? '✅ Na rota' : '＋ Rota') + '</button>'
      + navBtn
      + '<button class="btn bx sm" onclick="event.stopPropagation();abrirModal(\'' + o.id + '\')">✏️</button>'
      + '<button class="btn bd sm" onclick="event.stopPropagation();excluir(\'' + o.id + '\')">🗑</button>'
      + waBtn
      + '</div></div>';
  }).join('');
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ══════════════════════════════════════
// ROTA
// ══════════════════════════════════════
function toggleRota(id) {
  var i = rota.indexOf(id);
  if (i >= 0) rota.splice(i, 1); else rota.push(id);
  salvarLS(); renderTudo(); aba(2);
}
function remRota(id) {
  rota = rota.filter(function(r){ return r !== id; });
  salvarLS(); renderTudo();
}
function limparRota() {
  if (!rota.length || confirm('Limpar rota?')) { rota = []; salvarLS(); renderTudo(); }
}

function renderRota() {
  var el = document.getElementById('listaRota');
  var items = rota.map(function(id){
    return obras.find(function(o){ return o.id === id; });
  }).filter(Boolean);

  if (!items.length) {
    el.innerHTML = '<div class="empty"><div class="ic">🧭</div>Nenhuma obra na rota.<br>Adicione na aba <b>Obras</b>.</div>';
    return;
  }

  var semEnd = items.filter(function(o){ return !o.end; });
  var aviso = semEnd.length
    ? '<div style="background:rgba(224,92,110,.1);border:1px solid rgba(224,92,110,.3);border-radius:8px;padding:10px;font-size:12px;color:var(--red);margin-bottom:10px">⚠️ Obras sem endereço não entram na rota: '
      + semEnd.map(function(o){ return esc(o.nome); }).join(', ') + '</div>'
    : '';

  el.innerHTML = aviso + items.map(function(o, i){
    return '<div class="ri">'
      + '<div class="rnum">' + (i+1) + '</div>'
      + '<div class="rinfo"><b>' + esc(o.nome) + '</b>'
      + '<small>' + (o.end ? esc(o.end) : '⚠️ sem endereço') + '</small></div>'
      + '<button class="rdel" onclick="remRota(\'' + o.id + '\')">✕</button>'
      + '</div>';
  }).join('');
}

// ══════════════════════════════════════
// NAVEGAÇÃO
// ══════════════════════════════════════
function getItensComEnd() {
  return rota
    .map(function(id){ return obras.find(function(o){ return o.id === id; }); })
    .filter(function(o){ return o && o.end && o.end.trim(); });
}

function abrirUrl(url) {
  var a = document.createElement('a');
  a.href = url; a.target = '_blank'; a.rel = 'noopener';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function irMaps() {
  var items = getItensComEnd();
  if (!items.length) { alert('Adicione obras COM ENDEREÇO à rota primeiro.'); return; }

  var url;
  if (items.length === 1) {
    url = 'https://www.google.com/maps/dir/?api=1'
        + '&origin=My+Location'
        + '&destination=' + encodeURIComponent(items[0].end)
        + '&travelmode=driving';
  } else {
    var waypoints = items.slice(0, items.length - 1)
      .map(function(o){ return encodeURIComponent(o.end); }).join('|');
    url = 'https://www.google.com/maps/dir/?api=1'
        + '&origin=My+Location'
        + '&destination=' + encodeURIComponent(items[items.length - 1].end)
        + '&waypoints=' + waypoints
        + '&travelmode=driving';
  }
  abrirUrl(url);
}

function irWaze() {
  var items = getItensComEnd();
